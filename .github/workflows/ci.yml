name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  core:
    name: core (go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 1.22.x verifies the go.mod floor; stable catches regressions on the latest release.
        go-version: ['1.22.x', 'stable']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...
      - name: bench smoke
        run: go test -run=XXX -bench=. -benchtime=1x ./...

  submodules:
    name: ${{ matrix.module }} (go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Submodules with their own go.mod, tested against the local core.
        # 1.25.x verifies the submodules' go.mod floor, mirroring core's
        # 1.22.x; stable catches regressions on the latest release.
        module: ['grpcerr', 'otelerr']
        go-version: ['1.25.x', 'stable']
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: use the local core module
        # The submodule's go.mod pins the released errtrail; point it at the
        # working tree so a core change that breaks it fails here, not after
        # the next tag.
        run: |
          go mod edit -replace github.com/repenguin22/errtrail=..
          go mod tidy
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...

  lint:
    name: lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Separate go.mod modules, each linted from its own root. All share
        # the .golangci.yml at the repository root.
        module: ['.', 'grpcerr', 'otelerr']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: install golangci-lint
        # Pinned to match the version used locally; bump deliberately.
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: use the local core module
        # Same replace as the submodule test job: lint HEAD against HEAD.
        if: matrix.module != '.'
        working-directory: ${{ matrix.module }}
        run: |
          go mod edit -replace github.com/repenguin22/errtrail=..
          go mod tidy
      - name: lint
        working-directory: ${{ matrix.module }}
        run: golangci-lint run --config "${{ github.workspace }}/.golangci.yml" ./...

  vuln:
    name: govulncheck (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ['.', 'grpcerr', 'otelerr']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: install govulncheck
        # The vulnerability database is fetched at run time, so @latest is fine
        # (and desirable) here — no version pin needed.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: use the local core module
        # govulncheck builds the packages, so it needs the same replace as
        # the test and lint jobs to analyze HEAD against HEAD.
        if: matrix.module != '.'
        working-directory: ${{ matrix.module }}
        run: |
          go mod edit -replace github.com/repenguin22/errtrail=..
          go mod tidy
      - name: govulncheck
        working-directory: ${{ matrix.module }}
        run: govulncheck ./...

  coverage:
    name: coverage (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ['.', 'grpcerr', 'otelerr']
    env:
      # Floor, not a target. All modules sit ~96-97%; this catches a real
      # regression without nagging on normal fluctuation. Raise deliberately.
      MIN_COVERAGE: '90.0'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: use the local core module
        # Measure the submodule against the working-tree core, like the other
        # submodule jobs.
        if: matrix.module != '.'
        working-directory: ${{ matrix.module }}
        run: |
          go mod edit -replace github.com/repenguin22/errtrail=..
          go mod tidy
      - name: coverage
        working-directory: ${{ matrix.module }}
        run: |
          name='${{ matrix.module }}'
          [ "$name" = '.' ] && name='core'
          go test -covermode=atomic -coverprofile=cover.out ./...
          pct=$(go tool cover -func=cover.out | awk '/^total:/{gsub(/%/,"",$NF); print $NF}')
          {
            echo "### Coverage — \`$name\`"
            echo ""
            echo "**${pct}%** of statements (minimum ${MIN_COVERAGE}%)"
          } >> "$GITHUB_STEP_SUMMARY"
          awk -v p="$pct" -v min="$MIN_COVERAGE" 'BEGIN { exit (p+0 < min+0) ? 1 : 0 }' \
            || { echo "::error::$name coverage ${pct}% is below the ${MIN_COVERAGE}% minimum"; exit 1; }
