name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  core:
    name: core (go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 1.22.x は go.mod の下限保証、stable は最新での回帰検知。
        go-version: ['1.22.x', 'stable']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: gofmt
        if: matrix.go-version == 'stable'
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt needed on:"; echo "$out"; exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...
      - name: bench smoke
        run: go test -run=XXX -bench=. -benchtime=1x ./...

  grpcerr:
    name: grpcerr (go stable)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: grpcerr
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...
