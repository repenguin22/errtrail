name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  core:
    name: core (go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 1.22.x verifies the go.mod floor; stable catches regressions on the latest release.
        go-version: ['1.22.x', 'stable']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...
      - name: bench smoke
        run: go test -run=XXX -bench=. -benchtime=1x ./...

  grpcerr:
    name: grpcerr (go stable)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: grpcerr
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...

  lint:
    name: lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Two separate go.mod modules, each linted from its own root. Both
        # share the .golangci.yml at the repository root.
        module: ['.', 'grpcerr']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: install golangci-lint
        # Pinned to match the version used locally; bump deliberately.
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: lint
        working-directory: ${{ matrix.module }}
        run: golangci-lint run --config "${{ github.workspace }}/.golangci.yml" ./...

  vuln:
    name: govulncheck (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ['.', 'grpcerr']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: install govulncheck
        # The vulnerability database is fetched at run time, so @latest is fine
        # (and desirable) here — no version pin needed.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: govulncheck
        working-directory: ${{ matrix.module }}
        run: govulncheck ./...
